name: AgentCy
options:
  bundleIdPrefix: app.agentcy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: "1.0.0"

targets:
  AgentCy:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: Core
      - path: DesignSystem
      - path: Resources
    resources:
      - path: Resources
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: Kingfisher
      - package: KeychainAccess
      - package: SwiftSoup
      - package: Dependencies
        product: Dependencies
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.agentcy.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: agent.cy
    entitlements:
      path: App/AgentCy.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.agentcy
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.agentcy
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.agentcy.ios.share
        PRODUCT_NAME: ShareWith AgentCy
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.agentcy

  AgentCyWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
    settings:
      base:
        INFOPLIST_FILE: Widgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.agentcy.ios.widgets
        PRODUCT_NAME: AgentCy Widgets
